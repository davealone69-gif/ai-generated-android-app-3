name: Setup Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Gradle 8.5
        run: |
          mkdir -p gradle/wrapper
          cd gradle/wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle-8.5-bin.zip
          unzip -j gradle-8.5-bin.zip "gradle-8.5/lib/gradle-wrapper.jar"
          rm gradle-8.5-bin.zip

      - name: Verify wrapper JAR
        run: ls -la gradle/wrapper/

      - name: Commit wrapper JAR
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add gradle/wrapper/gradle-wrapper.jar
          git commit -m "Add gradle-wrapper.jar" || echo "No changes to commit"
          git push
