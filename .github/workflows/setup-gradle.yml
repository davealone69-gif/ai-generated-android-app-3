name: Setup Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create temporary gradle project and extract wrapper
        run: |
          mkdir -p /tmp/gradle-init
          cd /tmp/gradle-init
          gradle init --type basic --dsl kotlin --project-name temp --no-split-project || true
          ls -la gradle/wrapper/
          
      - name: Copy wrapper JAR to repo
        run: |
          mkdir -p gradle/wrapper
          cp /tmp/gradle-init/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/ || echo "JAR not found, trying alternate location"
          ls -la gradle/wrapper/

      - name: Commit wrapper JAR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar
          git commit -m "Add gradle-wrapper.jar" || echo "No changes to commit"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
